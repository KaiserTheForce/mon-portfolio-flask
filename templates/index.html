{% extends "base.html" %}

{% block contenu %}
  <div class="carte" style="display: flex; flex-wrap: wrap; gap: 40px; align-items: center; position: relative;">
    
    <div style="position: absolute; top: -15px; right: 30px; background: var(--secondary); color: white; padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 13px; animation: pulse 2s infinite;">
      <i class="fa-solid fa-bullseye"></i> {{ moi.recherche }}
    </div>

    <!-- Colonne GAUCHE : Texte -->
    <div style="flex: 1; min-width: 300px;">
      <p style="color: var(--primary); font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-size: 13px;">
        Étudiant en {{ moi.classe }}
      </p>
      <h1 style="font-size: 3em; line-height: 1.1; margin-bottom: 15px; letter-spacing: -1px;">
        Salut, je suis <br><span style="color: var(--primary);">{{ moi.prenom }} {{ moi.nom }}</span>.
      </h1>
      <h2 style="color: var(--text-muted); font-size: 1.4em; font-weight: 500; margin-bottom: 25px;">
        {{ moi.titre }}
      </h2>
      
      <p style="font-size: 1.1em; line-height: 1.6; color: var(--text-main); border-left: 4px solid var(--primary); padding-left: 20px; margin-bottom: 35px;">
        {{ moi.accroche }}
      </p>

      <div style="display: flex; flex-wrap: wrap; align-items: center;">
        
        <!-- NOUVEAU : Bouton interactif pour copier l'email -->
        <button id="btn-copie" class="btn btn-primary" onclick="copierEmail('{{ moi.email }}')">
          <i class="fa-solid fa-copy"></i> Copier mon Email
        </button>

        <a href="{{ url_for('static', filename=moi.cv) }}" download class="btn btn-outline">
          <i class="fa-solid fa-download"></i> Télécharger CV
        </a>
        
        <!-- Petit message qui apparaîtra dynamiquement -->
        <span id="msg-copie" style="color: var(--secondary); font-weight: bold; margin-left: 10px; opacity: 0; transition: opacity 0.3s;">
          Copié ! ✅
        </span>

      </div>
    </div>

    <!-- Colonne DROITE : Photo + Réseaux -->
    <div style="flex: 0 1 300px; display: flex; flex-direction: column; align-items: center;">
      <div style="position: relative; width: 220px; height: 220px; margin-bottom: 30px;">
        <div style="position: absolute; inset: 10px; background: var(--primary); border-radius: 50%; opacity: 0.1; transform: translate(15px, 15px);"></div>
        <img src="{{ url_for('static', filename=moi.photo) }}" 
             alt="{{ moi.prenom }}" 
             style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; position: relative; z-index: 2; border: 8px solid var(--card-bg); box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
      </div>
      
      <div style="display: flex; gap: 15px;">
        <a href="{{ moi.linkedin }}" target="_blank" style="color: var(--text-main); font-size: 24px; transition: color 0.3s;">
          <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="https://github.com/KaiserTheForce" target="_blank" style="color: var(--text-main); font-size: 24px; transition: color 0.3s;">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>

  </div>

  <!-- NOUVEAU : JAVASCRIPT POUR LA COPIE D'EMAIL -->
  <script>
    function copierEmail(email) {
      // 1. On utilise l'API Clipboard du navigateur (Standard HTML5)
      navigator.clipboard.writeText(email).then(() => {
        // 2. On fait apparaître le petit message "Copié !"
        const msg = document.getElementById('msg-copie');
        msg.style.opacity = '1';
        
        // 3. On le fait disparaître au bout de 2 secondes (2000 millisecondes)
        setTimeout(() => {
          msg.style.opacity = '0';
        }, 2000);
      });
    }
  </script>
{% endblock %}
